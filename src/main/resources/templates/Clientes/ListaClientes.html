<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Clientes - IGOR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .truncate-id {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-100">

  <div class="flex flex-1">
    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <main class="flex-1 p-8 space-y-8">
      <section class="bg-white p-6 rounded shadow space-y-4">
        <h1 class="text-3xl font-bold mb-4">Lista de Clientes</h1>

        <!-- Botón volver -->
        <div class="mb-4">
          <a th:href="@{/clientes}"
             class="inline-block bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded shadow">
             ← Volver a Clientes
          </a>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full table-fixed bg-gray-100 rounded divide-y divide-gray-300">
            <colgroup>
              <col style="width: 160px;">   <!-- ID truncado -->
              <col style="width: 20%;">     <!-- Nombre -->
              <col style="width: 15%;">     <!-- Usuario -->
              <col style="width: 22%;">     <!-- Correo -->
              <col style="width: 10%;">     <!-- Rol -->
              <col style="width: 100px;">   <!-- Acciones -->
            </colgroup>
            <thead class="bg-gray-200">
              <tr>
                <th class="px-4 py-3 text-left font-semibold text-gray-800 text-sm">ID</th>
                <th class="px-4 py-3 text-left font-semibold text-gray-800 text-sm">Nombre</th>
                <th class="px-4 py-3 text-left font-semibold text-gray-800 text-sm">Usuario</th>
                <th class="px-4 py-3 text-left font-semibold text-gray-800 text-sm">Correo</th>
                <th class="px-4 py-3 text-left font-semibold text-gray-800 text-sm">Rol</th>
                <th class="px-4 py-3 text-left font-semibold text-gray-800 text-sm">Acciones</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-300">
              <tr th:each="c : ${clientes}" class="hover:bg-gray-50">
                <!-- ID truncado con tooltip para ver completo -->
                <td class="px-4 py-3">
                  <span class="truncate-id block text-sm text-gray-600 font-mono"
                        th:text="${c.id}"
                        th:title="${c.id}">ID</span>
                </td>
                <td class="px-4 py-3 text-sm truncate" th:text="${c.nombre_completo}">Nombre</td>
                <td class="px-4 py-3 text-sm truncate" th:text="${c.usuario}">Usuario</td>
                <td class="px-4 py-3 text-sm truncate" th:text="${c.correo}">Correo</td>
                <td class="px-4 py-3 text-sm" th:text="${c.rol}">Rol</td>
                <td class="px-4 py-3 text-sm">
                  <a th:if="${rol == 'DIRECTOR' or rol == 'SUPERVISOR' or rol == 'TRABAJADOR'}"
                     th:href="@{'/cliente/' + ${c.id}}"
                     class="text-indigo-600 hover:underline">Editar</a>
                  <span th:if="${rol == 'CLIENTE'}"
                        class="text-gray-400 text-sm italic">Sin acceso</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Footer -->
  <div th:replace="fragments/footer :: footer"></div>

</body>
</html>
