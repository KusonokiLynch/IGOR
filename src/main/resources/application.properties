spring.application.name=proyectoIGOR

# ✅ MongoDB - Desde variable de entorno
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=IGOR

# ✅ Server
server.port=${PORT:8080}
server.servlet.context-path=/

# ✅ Mail SMTP - Desde variables de entorno
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# ✅ Brevo Email Service API Key - Desde variable de entorno
brevo.api.key=${BREVO_API_KEY}

# ✅ Google OAuth - Desde variables de entorno
google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/gmail/callback}
google.oauth.auth-uri=https://accounts.google.com/o/oauth2/auth
google.oauth.token-uri=https://oauth2.googleapis.com/token
google.oauth.auth-provider-cert-url=https://www.googleapis.com/oauth2/v1/certs

# ✅ File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==================== LOGGING SIMPLIFICADO ====================

# ✅ Root
logging.level.root=WARN

# ✅ Mi aplicación - DEBUG para ver todo
logging.level.com.example.IGORPROYECTO=DEBUG

# ✅ Spring Web
logging.level.org.springframework.web=INFO

# ✅ Spring Security - Una sola vez
logging.level.org.springframework.security=DEBUG

# ✅ Spring Data
logging.level.org.springframework.data=INFO

# ✅ Thymeleaf
logging.level.org.thymeleaf=INFO

# ✅ Mail
logging.level.org.springframework.mail=INFO

# ✅ Formato de logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n