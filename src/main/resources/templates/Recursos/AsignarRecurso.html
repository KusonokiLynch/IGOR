<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asignar Recurso - IGOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col min-h-screen bg-gray-100">

    <div class="flex flex-1">
        <!-- Sidebar -->
        <div th:replace="fragments/sidebar :: sidebar"></div>

        <!-- Main Content -->
        <main class="flex-1 p-8">

            <section class="text-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 mb-2">Asignar Recurso</h1>
                <p class="text-gray-600">Asigna un recurso a un miembro del equipo</p>
            </section>

            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-lg shadow-lg p-8">

                    <!-- Info del recurso -->
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded">
                        <h2 class="text-lg font-bold text-blue-800 mb-2">Recurso seleccionado</h2>
                        <div class="grid grid-cols-2 gap-2 text-sm text-blue-700">
                            <span><strong>Nombre:</strong> <span th:text="${recurso.nombre}"></span></span>
                            <span><strong>Tipo:</strong> <span th:text="${recurso.tipo}"></span></span>
                            <span><strong>Cantidad:</strong> <span th:text="${recurso.cantidad}"></span></span>
                            <span><strong>Disponible:</strong> <span th:text="${recurso.disponibilidad ? 'Sí' : 'No'}"></span></span>
                        </div>
                    </div>

                    <!-- Asignaciones actuales -->
                    <div th:if="${not #lists.isEmpty(recurso.asignadoA)}" class="mb-6">
                        <h3 class="text-md font-semibold text-gray-700 mb-2">Actualmente asignado a:</h3>
                        <div class="flex flex-wrap gap-2">
                            <span th:each="userId : ${recurso.asignadoA}"
                                  class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm"
                                  th:text="${usuariosMap[userId] != null ? usuariosMap[userId] : userId}">
                            </span>
                        </div>
                    </div>

                    <!-- Formulario de asignación -->
                    <form th:action="@{/recursos/asignar/{id}(id=${recurso.id})}" method="post">

                        <div class="mb-6">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">
                                Seleccionar usuario para asignar
                            </label>
                            <select name="usuarioId"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required>
                                <option value="">-- Selecciona un usuario --</option>
                                <th:block th:each="usuario : ${usuarios}">
                                    <option th:value="${usuario.id}"
                                            th:text="${usuario.nombre_completo + ' (' + usuario.rol.replace('ROLE_','') + ')'}">
                                    </option>
                                </th:block>
                            </select>
                        </div>

                        <div class="flex gap-4">
                            <button type="submit"
                                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                                Asignar Recurso
                            </button>
                            <a th:href="@{/recursos/consultar}"
                               class="flex-1 text-center bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-3 rounded-lg font-semibold transition">
                                Cancelar
                            </a>
                        </div>

                    </form>

                    <!-- Mensajes -->
                    <div th:if="${mensaje}" class="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg">
                        <p class="text-green-700 font-medium" th:text="${mensaje}"></p>
                    </div>
                    <div th:if="${error}" class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg">
                        <p class="text-red-700 font-medium" th:text="${error}"></p>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <!-- Footer -->
    <div th:replace="fragments/footer :: footer"></div>

</body>
</html>
